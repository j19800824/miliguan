<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>米粒冠 App 设计预览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #E8520B;
    --primary-dark: #C43F06;
    --gold: #F5A827;
    --bg: #FFF8F0;
    --surface: #FFFFFF;
    --text: #1A0A00;
    --text2: #8B5A3A;
    --text3: #C4956A;
    --border: #F0E0D0;
    --success: #22C55E;
    --danger: #DC2626;
    --warning: #F59E0B;
  }
  body { background: #1a1a2e; font-family: -apple-system, 'PingFang SC', sans-serif; min-height: 100vh; }

  /* Top bar */
  .top-bar {
    background: linear-gradient(135deg, #E8520B, #C43F06);
    padding: 16px 32px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: 0 4px 20px rgba(232,82,11,0.4);
  }
  .logo { width: 36px; height: 36px; background: rgba(255,255,255,0.2); border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .brand { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 2px; }
  .brand-sub { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 1px; }
  .top-bar-right { margin-left: auto; display: flex; gap: 8px; }

  /* Role tabs */
  .role-tabs {
    display: flex; gap: 8px; background: rgba(255,255,255,0.12);
    border-radius: 20px; padding: 4px;
  }
  .role-tab {
    padding: 6px 16px; border-radius: 16px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.7);
    background: transparent; transition: all 0.2s;
  }
  .role-tab.active { background: #fff; color: var(--primary); }
  .role-tab:hover:not(.active) { color: #fff; background: rgba(255,255,255,0.15); }

  /* Main layout */
  .main { display: flex; gap: 32px; padding: 32px; justify-content: center; flex-wrap: wrap; }

  /* Phone frame */
  .phone-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .phone-label {
    color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .phone {
    width: 375px; height: 750px;
    background: #111; border-radius: 44px;
    box-shadow: 0 0 0 2px #333, 0 0 0 4px #222, 0 30px 60px rgba(0,0,0,0.6);
    overflow: hidden; position: relative;
    border: 2px solid #444;
  }
  .phone-notch {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 30px; background: #111; border-radius: 0 0 18px 18px; z-index: 10;
  }
  .phone-screen {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden; position: relative;
  }

  /* Screen panels */
  .screen { display: none; width: 100%; height: 100%; flex-direction: column; overflow: hidden; }
  .screen.active { display: flex; }

  /* Screen nav tabs */
  .screen-tabs {
    display: flex; gap: 6px; padding: 8px 12px 0;
    background: var(--bg); flex-shrink: 0;
  }
  .screen-tab {
    padding: 5px 12px; border-radius: 12px; border: none; cursor: pointer;
    font-size: 11px; font-weight: 600; background: var(--border); color: var(--text2);
    transition: all 0.15s;
  }
  .screen-tab.active { background: var(--primary); color: #fff; }

  /* Status bar */
  .status-bar {
    height: 44px; background: var(--bg);
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 20px 6px; font-size: 12px; color: var(--text); font-weight: 600; flex-shrink: 0;
  }

  /* Scroll content */
  .scroll-content { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .scroll-content::-webkit-scrollbar { display: none; }

  /* Bottom tab bar */
  .tab-bar {
    height: 70px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    padding-bottom: 10px; flex-shrink: 0;
  }
  .tab-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  .tab-icon { font-size: 22px; line-height: 1; }
  .tab-text { font-size: 10px; color: var(--text3); font-weight: 600; }
  .tab-item.active .tab-text { color: var(--primary); }

  /* ── Components ── */
  .greeting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .greeting { font-size: 18px; font-weight: 800; color: var(--text); }
  .greeting-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .badge { border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 700; }
  .badge-primary { background: #FFF3EC; color: var(--primary); border: 1px solid var(--border); }
  .badge-gold { background: var(--gold); color: var(--text); }
  .badge-success { background: #DCFCE7; color: var(--success); }
  .badge-danger { background: #FEE2E2; color: var(--danger); }

  .kpi-row { display: flex; gap: 8px; }
  .kpi-card {
    flex: 1; background: var(--surface); border-radius: 12px; padding: 12px;
    border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(232,82,11,0.06);
  }
  .kpi-card.accent { background: var(--primary); border-color: var(--primary-dark); }
  .kpi-card.gold { background: var(--gold); border-color: #E09000; }
  .kpi-label { font-size: 10px; color: var(--text2); margin-bottom: 3px; }
  .kpi-card.accent .kpi-label, .kpi-card.gold .kpi-label { color: rgba(255,255,255,0.8); }
  .kpi-value { font-size: 18px; font-weight: 800; color: var(--text); }
  .kpi-card.accent .kpi-value { color: #fff; }
  .kpi-sub { font-size: 10px; color: var(--success); font-weight: 700; margin-top: 2px; }
  .kpi-card.accent .kpi-sub { color: rgba(255,255,255,0.85); }

  .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .section-title { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: var(--text); }
  .section-bar { width: 3px; height: 14px; background: var(--primary); border-radius: 2px; }
  .section-action { font-size: 12px; color: var(--primary); font-weight: 600; }

  .card { background: var(--surface); border-radius: 12px; padding: 12px; border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(232,82,11,0.05); }
  .card-row { display: flex; align-items: center; gap: 10px; }

  .branch-card { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--border); margin-bottom: 6px; }
  .branch-rank { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: var(--primary); flex-shrink: 0; }
  .branch-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .branch-meta { font-size: 10px; color: var(--text2); margin-top: 2px; }
  .branch-sales { margin-left: auto; text-align: right; }
  .branch-sales-val { font-size: 13px; font-weight: 800; color: var(--text); }
  .trend-up { color: var(--success); font-size: 10px; }
  .trend-down { color: var(--danger); font-size: 10px; }

  /* Points card */
  .points-card {
    background: var(--primary); border-radius: 16px; padding: 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 6px 20px rgba(232,82,11,0.3);
  }
  .points-card-left { flex: 1; }
  .points-card-label { font-size: 11px; color: rgba(255,255,255,0.75); }
  .points-card-value { font-size: 30px; font-weight: 900; color: #fff; margin: 3px 0; }
  .points-card-sub { font-size: 10px; color: rgba(255,255,255,0.6); }
  .order-btn { background: var(--gold); border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 800; color: var(--text); cursor: pointer; white-space: nowrap; }

  /* Quick actions */
  .quick-row { display: flex; justify-content: space-between; background: var(--surface); border-radius: 12px; padding: 12px; border: 1px solid var(--border); }
  .quick-item { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .quick-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .quick-label { font-size: 10px; color: var(--text2); font-weight: 600; }

  /* Scan button */
  .scan-btn {
    background: var(--primary); border-radius: 20px; padding: 24px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; box-shadow: 0 8px 24px rgba(232,82,11,0.4);
  }
  .scan-icon { font-size: 48px; }
  .scan-title { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 1px; }
  .scan-sub { font-size: 12px; color: rgba(255,255,255,0.75); }

  .staff-btn { display: flex; align-items: center; justify-content: center; gap: 8px; background: var(--surface); border-radius: 12px; padding: 12px; border: 1.5px solid var(--border); cursor: pointer; }
  .staff-btn-text { font-size: 14px; font-weight: 600; color: var(--text2); }

  /* Stats row */
  .stats-row { display: flex; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  .stat-cell { flex: 1; padding: 12px 8px; text-align: center; }
  .stat-cell + .stat-cell { border-left: 1px solid var(--border); }
  .stat-val { font-size: 22px; font-weight: 900; color: var(--primary); }
  .stat-val.gold { color: var(--gold); }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 3px; }

  /* Record row */
  .record-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--border); margin-bottom: 6px; }
  .record-row.fail { border-color: var(--danger); background: #FFF8F8; }
  .record-status { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
  .rs-ok { background: var(--success); }
  .rs-fail { background: var(--danger); }
  .record-name { font-size: 13px; font-weight: 600; color: var(--text); }
  .record-meta { font-size: 10px; color: var(--text3); margin-top: 1px; }

  /* Ranking */
  .my-rank-card { background: var(--primary); border-radius: 14px; padding: 14px 16px; }
  .my-rank-label { font-size: 10px; color: rgba(255,255,255,0.65); margin-bottom: 6px; }
  .my-rank-row { display: flex; align-items: center; gap: 10px; }
  .my-rank-num { font-size: 32px; font-weight: 900; color: var(--gold); }
  .my-rank-info { flex: 1; }
  .my-rank-name { font-size: 15px; font-weight: 800; color: #fff; }
  .my-rank-org { font-size: 10px; color: rgba(255,255,255,0.65); margin-top: 2px; }
  .my-rank-pts { font-size: 18px; font-weight: 900; color: var(--gold); }

  .rank-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--border); margin-bottom: 6px; }
  .rank-row.me { background: #FFF3EC; border-color: var(--primary); border-width: 1.5px; }
  .rank-pos { width: 32px; text-align: center; font-size: 20px; }
  .rank-name { flex: 1; font-size: 13px; font-weight: 700; color: var(--text); }
  .rank-name.me { color: var(--primary); }
  .rank-org { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .rank-pts { font-size: 15px; font-weight: 800; color: var(--gold); }
  .rank-unit { font-size: 10px; color: var(--text3); }

  /* Period tabs */
  .period-row { display: flex; background: var(--surface); border-radius: 10px; padding: 3px; border: 1px solid var(--border); }
  .period-btn { flex: 1; padding: 6px; border-radius: 8px; text-align: center; font-size: 12px; font-weight: 700; color: var(--text2); cursor: pointer; }
  .period-btn.active { background: var(--primary); color: #fff; }

  /* Warn */
  .warn-card { display: flex; align-items: center; gap: 8px; background: var(--surface); border-radius: 10px; padding: 10px 12px; border: 1.5px solid var(--danger); margin-bottom: 6px; }
  .warn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex-shrink: 0; }
  .warn-text { font-size: 12px; color: var(--text); line-height: 1.4; }

  /* Inventory */
  .inv-row { display: flex; align-items: center; background: var(--surface); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--border); margin-bottom: 6px; }
  .inv-row.warn { border-color: var(--danger); }
  .inv-name { flex: 1; font-size: 13px; font-weight: 600; color: var(--text); }
  .inv-tag { font-size: 10px; color: var(--danger); background: #FEE2E2; border-radius: 5px; padding: 2px 6px; margin-left: 6px; font-weight: 700; }
  .inv-stock { font-size: 14px; font-weight: 800; color: var(--text); }
  .inv-stock.warn { color: var(--danger); }

  /* Store row */
  .store-row { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 10px; padding: 10px 12px; border: 1px solid var(--border); margin-bottom: 6px; }
  .store-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .store-dot.warn { background: var(--warning); }
  .store-name { font-size: 13px; font-weight: 700; color: var(--text); }
  .store-mgr { font-size: 10px; color: var(--text3); margin-top: 1px; }
  .store-verify { margin-left: auto; font-size: 12px; color: var(--text2); font-weight: 600; }

  /* Order card */
  .order-card { background: var(--surface); border-radius: 12px; padding: 12px; border: 1px solid var(--border); margin-bottom: 8px; }
  .order-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .order-id { font-size: 10px; color: var(--text3); font-family: monospace; }
  .order-body { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .order-sku { font-size: 13px; font-weight: 700; color: var(--text); }
  .order-qty { font-size: 13px; color: var(--text2); }
  .order-ft { display: flex; justify-content: space-between; padding-top: 8px; border-top: 1px solid var(--border); }
  .order-date { font-size: 10px; color: var(--text3); }
  .order-pts { font-size: 14px; font-weight: 900; color: var(--gold); }
  .order-pts-label { font-size: 10px; color: var(--text2); }

  /* Profile */
  .profile-card { background: var(--surface); border-radius: 14px; padding: 14px; border: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
  .profile-avatar { width: 56px; height: 56px; border-radius: 50%; background: var(--bg); border: 2.5px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; }
  .profile-name { font-size: 18px; font-weight: 800; color: var(--text); }
  .profile-role { display: inline-block; background: #FFF3EC; border-radius: 6px; padding: 2px 8px; font-size: 11px; color: var(--primary); font-weight: 700; margin: 4px 0; border: 1px solid var(--border); }
  .profile-org { font-size: 11px; color: var(--text3); }
  .profile-pts { margin-left: auto; text-align: right; }
  .profile-pts-val { font-size: 18px; font-weight: 900; color: var(--gold); }
  .profile-pts-label { font-size: 10px; color: var(--text3); }

  .menu-card { background: var(--surface); border-radius: 14px; border: 1px solid var(--border); overflow: hidden; }
  .menu-row { display: flex; align-items: center; gap: 12px; padding: 13px 14px; }
  .menu-row + .menu-row { border-top: 1px solid var(--border); }
  .menu-icon { font-size: 20px; }
  .menu-label { flex: 1; font-size: 14px; color: var(--text); }
  .menu-arrow { font-size: 18px; color: var(--text3); }

  .logout-btn { border: 1.5px solid var(--danger); border-radius: 12px; padding: 12px; text-align: center; font-size: 14px; font-weight: 800; color: var(--danger); cursor: pointer; }

  /* Login */
  .login-header { padding: 16px 16px 10px; }
  .login-logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .login-logo { width: 52px; height: 52px; background: var(--primary); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 4px 12px rgba(232,82,11,0.3); }
  .login-brand { font-size: 22px; font-weight: 900; color: var(--primary); letter-spacing: 1px; }
  .login-slogan { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .login-welcome { font-size: 28px; font-weight: 900; color: var(--text); }
  .login-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .role-card { display: flex; align-items: center; gap: 12px; background: var(--surface); border-radius: 14px; padding: 14px; border: 1.5px solid var(--border); margin-bottom: 8px; cursor: pointer; }
  .role-card.selected { border-color: var(--primary); background: #FFF3EC; }
  .role-avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
  .role-name { font-size: 15px; font-weight: 800; color: var(--text); }
  .role-type { font-size: 12px; font-weight: 700; margin-top: 2px; }
  .role-org { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .role-check { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 900; color: #fff; margin-left: auto; flex-shrink: 0; }

  .login-btn { background: var(--primary); border-radius: 14px; padding: 14px; text-align: center; font-size: 16px; font-weight: 800; color: #fff; cursor: pointer; box-shadow: 0 6px 20px rgba(232,82,11,0.35); }
  .login-hint { text-align: center; font-size: 11px; color: var(--text3); margin-top: 8px; }
  .login-footer { padding: 10px 16px 16px; }

  /* Scan screen */
  .scan-screen-bg { background: #0D1117; flex: 1; display: flex; flex-direction: column; }
  .scan-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; }
  .scan-hd-title { font-size: 18px; font-weight: 800; color: #fff; }
  .flash-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
  .viewfinder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
  .camera-area { width: 220px; height: 220px; background: rgba(255,255,255,0.04); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; }
  .corner { position: absolute; width: 24px; height: 24px; border-color: var(--primary); border-style: solid; }
  .c-tl { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .c-tr { top: -2px; right: -2px; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
  .c-bl { bottom: -2px; left: -2px; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
  .c-br { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
  .scan-line { width: 180px; height: 2px; background: var(--primary); border-radius: 1px; opacity: 0.7; margin-top: 12px; }
  .scan-hint { color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 20px; }
  .scan-result { margin: 12px 16px; background: var(--surface); border-radius: 16px; padding: 14px; border: 2px solid var(--success); display: flex; align-items: center; gap: 12px; }
  .scan-result-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; font-size: 20px; color: #fff; font-weight: 900; flex-shrink: 0; }
  .scan-result-title { font-size: 13px; font-weight: 800; color: var(--success); }
  .scan-result-product { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 2px; }
  .scan-result-pts { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .scan-continue { margin-left: auto; background: var(--primary); border-radius: 8px; padding: 8px 12px; font-size: 12px; font-weight: 800; color: #fff; cursor: pointer; white-space: nowrap; }
  .scan-demo-row { display: flex; gap: 8px; padding: 8px 16px 12px; justify-content: center; flex-wrap: wrap; }
  .scan-demo-hint { font-size: 10px; color: rgba(255,255,255,0.3); display: flex; align-items: center; }
  .demo-btn { border-radius: 8px; padding: 7px 14px; font-size: 11px; font-weight: 700; cursor: pointer; border: 1px solid; }
  .demo-ok { background: rgba(34,197,94,0.12); border-color: var(--success); color: var(--success); }
  .demo-fail { background: rgba(220,38,38,0.1); border-color: var(--danger); color: var(--danger); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(232,82,11,0.2); border-radius: 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo">👑</div>
  <div>
    <div class="brand">米粒冠</div>
    <div class="brand-sub">App 设计预览</div>
  </div>
  <div class="top-bar-right">
    <div class="role-tabs" id="roleTabs">
      <button class="role-tab active" onclick="switchRole('boss')">老板</button>
      <button class="role-tab" onclick="switchRole('branch')">分公司总经理</button>
      <button class="role-tab" onclick="switchRole('store')">门店店长</button>
      <button class="role-tab" onclick="switchRole('staff')">销售店员</button>

let currentRole = 'boss';

function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderPhones();
}

function renderPhones() {
  const area = document.getElementById('mainArea');
  const roleData = ROLES[currentRole];
  area.innerHTML = roleData.screens.map(screen => {
    const content = typeof screen.content === 'function' ? screen.content() : screen.content;
    const isScan = screen.id.includes('scan');
    return `
      <div class="phone-wrap">
        <div class="phone-label">${screen.label}</div>
        <div class="phone">
          <div class="phone-notch"></div>
          <div class="phone-screen" style="${isScan?'background:#0D1117':''}">
            <div class="screen active" style="background:${isScan?'#0D1117':'var(--bg)'}">
              ${content}
              ${screen.tabs.length > 0 ? `
              <div class="tab-bar">
                ${screen.tabs.map((t,i)=>`
                  <div class="tab-item ${i===screen.activeTab?'active':''}">
                    <div class="tab-icon">${t.split(' ')[0]}</div>
                    <div class="tab-text">${t.split(' ').slice(1).join(' ')}</div>
                  </div>`).join('')}
              </div>` : ''}
            </div>
          </div>
        </div>
      </div>`;
  }).join('');
}

renderPhones();
