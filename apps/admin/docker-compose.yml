services:
  postgres:
    image: postgres:16-alpine
    container_name: miliguan-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: miliguan_admin
      POSTGRES_USER: miliguan
      POSTGRES_PASSWORD: miliguan123
    ports:
      - '5432:5432'
    volumes:
      - miliguan_admin_postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: miliguan-admin-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - miliguan_admin_redis:/data

volumes:
  miliguan_admin_postgres:
  miliguan_admin_redis:
